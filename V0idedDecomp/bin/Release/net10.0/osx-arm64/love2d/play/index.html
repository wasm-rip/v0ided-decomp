<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LÖVE</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center}#l{display:flex;flex-direction:column;align-items:center;gap:2rem;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999}#p{width:300px;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.3)}#f{height:100%;background:linear-gradient(90deg,#4facfe,#00f2fe);width:0%;transition:width .1s;border-radius:4px}#t,#c{color:white;text-align:center}#t{font-size:14px}#c{font-size:12px;color:rgba(255,255,255,.6);margin-top:1rem;font-style:italic}canvas{display:block;width:100%;height:100%}</style></head><body><div id="l"><div id="t">Loading...</div><div id="p"><div id="f"></div></div><div id="c">runtime and wasm port made by sunsuke, use aspen @ squall.cc</div></div><canvas id="canvas"></canvas><script>let p=0;const pf=document.getElementById('f'),lc=document.getElementById('l');function sp(x){p=Math.max(p,x);pf.style.width=p+'%'}let s=0;const si=setInterval(()=>{if(s<90){s+=Math.random()*30;sp(Math.min(s,85))}},300);var Module={canvas:document.getElementById('canvas'),onRuntimeInitialized:function(){clearInterval(si);sp(100);setTimeout(()=>lc.style.display='none',300)},print:x=>console.log(x),printErr:x=>console.error(x)};(async()=>{try{const r=await fetch('game.love');if(!r.ok)throw new Error(r.statusText);const b=await r.arrayBuffer();const y=new Uint8Array(b);const st=FS.open('/game.love','w');FS.write(st,y,0,y.length);FS.close(st);sp(100)}catch(e){document.getElementById('t').textContent='Error: '+e.message}})();const oi=Module.onRuntimeInitialized;Module.onRuntimeInitialized=function(){if(oi)oi.call(this);}</script><script async src="love.js"></script></body></html
